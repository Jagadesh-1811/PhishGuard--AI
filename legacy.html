<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI — Phishing Email Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400..600&family=Newsreader:opsz,wght@6..72,200..400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --blue: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f97316;
            --border: #334155;
            --font-sans: system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        header p {
            color: var(--muted);
            font-size: 1.1rem;
        }

        .card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--muted);
        }

        input, textarea {
            width: 100%;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--blue);
        }

        .btn {
            width: 100%;
            background-color: var(--blue);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn.loading .spinner {
            display: block;
        }

        /* Result Card */
        #result-container {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-width: 1px;
            border-style: solid;
        }

        .result-card.phishing {
            background-color: #450a0a;
            border-color: var(--red);
        }

        .result-card.safe {
            background-color: #052e16;
            border-color: var(--green);
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge.high { background-color: var(--red); }
        .badge.medium { background-color: var(--orange); }
        .badge.low { background-color: var(--green); }

        .result-reason {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .signs-list {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .warning-text {
            color: var(--red);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        /* History Table */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .history-table th {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            font-weight: 600;
        }

        .history-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .row-phishing { background-color: rgba(239, 68, 68, 0.1); }
        .row-safe { background-color: rgba(34, 197, 94, 0.1); }

        /* Monitor Section */
        .monitor-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-top: 1rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.active { background-color: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.inactive { background-color: var(--muted); }

        .log-box {
            background-color: #020617;
            border: 1px solid var(--border);
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 1rem;
        }

        .log-line { margin-bottom: 0.25rem; }
        .log-phishing { color: var(--red); }
        .log-safe { color: var(--green); }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--border);
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--blue); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Toast */
        #toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
        }

        .toast {
            background-color: var(--red);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 0.5rem;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .help-text {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }

        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            .history-table th:nth-child(3), .history-table td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div class="container">
        <header>
            <h1>🛡️ PhishGuard AI</h1>
            <p>Powered by Google Gemini</p>
        </header>

        <!-- Manual Analysis Section -->
        <div class="card">
            <div class="card-title">Analyze a Suspicious Email</div>
            <div class="form-group">
                <label for="input-sender">Sender Address</label>
                <input type="email" id="input-sender" placeholder="e.g. alerts@paypa1.com">
            </div>
            <div class="form-group">
                <label for="input-subject">Email Subject</label>
                <input type="text" id="input-subject" placeholder="what was the subject line?">
            </div>
            <div class="form-group">
                <label for="input-body">Email Body</label>
                <textarea id="input-body" rows="8" placeholder="paste the full email content here..."></textarea>
            </div>
            <button id="btn-analyze" class="btn">
                <div class="spinner"></div>
                <span>Analyze for Phishing</span>
            </button>
            <div id="form-error" style="color: var(--red); font-size: 0.875rem; margin-top: 0.5rem; display: none;">Please fill in all fields</div>
        </div>

        <!-- Result Card -->
        <div id="result-container">
            <!-- Content injected via JS -->
        </div>

        <!-- History Section -->
        <div class="card">
            <div class="card-title">Recent Analyses</div>
            <div style="overflow-x: auto;">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Sender</th>
                            <th>Subject</th>
                            <th>Verdict</th>
                            <th>Risk</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Auto Monitor Section -->
        <div class="card">
            <div class="card-title">Auto Inbox Monitor</div>
            <div class="form-group">
                <label for="monitor-email">Your Gmail Address</label>
                <input type="email" id="monitor-email" placeholder="yourname@gmail.com">
            </div>
            <div class="form-group">
                <label for="monitor-password">Gmail App Password</label>
                <input type="password" id="monitor-password" placeholder="16-character app password">
                <p class="help-text">Get this from: myaccount.google.com → Security → App Passwords</p>
            </div>
            <div class="form-group">
                <label for="monitor-interval">Check Interval (minutes)</label>
                <input type="number" id="monitor-interval" value="5" min="1" max="60">
            </div>
            
            <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem;">
                <div class="monitor-status">
                    <div id="status-dot" class="status-dot inactive"></div>
                    <span id="status-text" style="color: var(--muted);">Monitor is off</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="monitor-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="log-box" id="log-box">
                <div class="log-line" style="color: var(--muted);">[SYSTEM] Waiting for monitor to start...</div>
            </div>
        </div>
    </div>

    <script>
        const btnAnalyze = document.getElementById('btn-analyze');
        const inputSender = document.getElementById('input-sender');
        const inputSubject = document.getElementById('input-subject');
        const inputBody = document.getElementById('input-body');
        const formError = document.getElementById('form-error');
        const resultContainer = document.getElementById('result-container');
        const historyBody = document.getElementById('history-body');
        
        const monitorToggle = document.getElementById('monitor-toggle');
        const monitorEmail = document.getElementById('monitor-email');
        const monitorPassword = document.getElementById('monitor-password');
        const monitorInterval = document.getElementById('monitor-interval');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const logBox = document.getElementById('log-box');

        let lastResult = null;

        // Load history from localStorage
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('phishguard_history') || '[]');
            historyBody.innerHTML = '';
            history.forEach(item => {
                const row = document.createElement('tr');
                row.className = item.verdict === 'YES' ? 'row-phishing' : 'row-safe';
                row.innerHTML = `
                    <td>${item.time}</td>
                    <td title="${item.sender}">${item.sender.substring(0, 20)}${item.sender.length > 20 ? '...' : ''}</td>
                    <td title="${item.subject}">${item.subject.substring(0, 30)}${item.subject.length > 30 ? '...' : ''}</td>
                    <td style="color: ${item.verdict === 'YES' ? 'var(--red)' : 'var(--green)'}; font-weight: bold;">${item.verdict === 'YES' ? 'PHISHING' : 'SAFE'}</td>
                    <td><span class="badge ${item.risk.toLowerCase()}">${item.risk}</span></td>
                `;
                historyBody.appendChild(row);
            });
        }

        function saveToHistory(item) {
            const history = JSON.parse(localStorage.getItem('phishguard_history') || '[]');
            history.unshift(item);
            if (history.length > 10) history.pop();
            localStorage.setItem('phishguard_history', JSON.stringify(history));
            loadHistory();
        }

        // Analyze Button Click
        btnAnalyze.addEventListener('click', async () => {
            const sender = inputSender.value.trim();
            const subject = inputSubject.value.trim();
            const body = inputBody.value.trim();

            if (!sender || !subject || !body) {
                formError.style.display = 'block';
                return;
            }
            formError.style.display = 'none';

            btnAnalyze.disabled = true;
            btnAnalyze.classList.add('loading');
            resultContainer.style.display = 'none';

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender, subject, body })
                });

                if (!response.ok) throw new Error('Analysis failed');

                const result = await response.json();
                lastResult = { sender, subject, ...result };
                showResult(result);
                saveToHistory({
                    time: new Date().toLocaleTimeString(),
                    sender,
                    subject,
                    verdict: result.verdict,
                    risk: result.risk
                });
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btnAnalyze.disabled = false;
                btnAnalyze.classList.remove('loading');
            }
        });

        function showResult(result) {
            const isPhishing = result.verdict === 'YES';
            resultContainer.innerHTML = `
                <div class="result-card ${isPhishing ? 'phishing' : 'safe'}">
                    <div class="result-header">
                        <div class="result-title">
                            ${isPhishing ? '⚠️ PHISHING DETECTED' : '✅ EMAIL LOOKS SAFE'}
                        </div>
                        <span class="badge ${result.risk.toLowerCase()}">${result.risk} RISK</span>
                    </div>
                    <div class="result-reason">${result.reason}</div>
                    ${isPhishing ? `
                        <ul class="signs-list">
                            ${result.signs.map(sign => `<li>${sign}</li>`).join('')}
                        </ul>
                        <div class="warning-text">DO NOT click any links in this email!</div>
                        <button class="btn" style="background-color: #000; width: auto;" onclick="sendWarning()">Send Warning Email</button>
                    ` : `
                        <p style="color: var(--muted); font-size: 0.875rem;">Always stay cautious online.</p>
                    `}
                </div>
            `;
            resultContainer.style.display = 'block';
        }

        async function sendWarning() {
            if (!lastResult) return;
            try {
                const response = await fetch('/api/send-warning', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sender: lastResult.sender,
                        subject: lastResult.subject,
                        risk: lastResult.risk,
                        reason: lastResult.reason
                    })
                });
                if (response.ok) alert('Warning email sent successfully!');
                else alert('Failed to send warning email. Check monitor settings.');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Monitor Toggle
        monitorToggle.addEventListener('change', async () => {
            if (monitorToggle.checked) {
                const email = monitorEmail.value.trim();
                const password = monitorPassword.value.trim();
                const interval = parseInt(monitorInterval.value);

                if (!email || !password) {
                    alert('Please enter Gmail address and App Password');
                    monitorToggle.checked = false;
                    return;
                }

                try {
                    const response = await fetch('/api/monitor/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, interval })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || 'Failed to start monitor');
                    }

                    statusDot.className = 'status-dot active';
                    statusText.innerText = `Monitoring active — checking every ${interval} min...`;
                    statusText.style.color = 'var(--green)';
                } catch (error) {
                    alert(error.message);
                    monitorToggle.checked = false;
                }
            } else {
                await fetch('/api/monitor/stop', { method: 'POST' });
                statusDot.className = 'status-dot inactive';
                statusText.innerText = 'Monitor is off';
                statusText.style.color = 'var(--muted)';
            }
        });

        // Polling Logs
        async function pollLogs() {
            try {
                const response = await fetch('/api/monitor/logs');
                if (!response.ok) return;
                const data = await response.json();
                
                if (data.logs.length > 0) {
                    const currentLogsCount = logBox.querySelectorAll('.log-line').length;
                    logBox.innerHTML = '';
                    data.logs.forEach(log => {
                        const line = document.createElement('div');
                        line.className = `log-line ${log.verdict === 'YES' ? 'log-phishing' : (log.verdict === 'NO' ? 'log-safe' : '')}`;
                        line.innerText = `[${log.time}] ${log.sender} — ${log.verdict === 'YES' ? 'PHISHING' : (log.verdict === 'NO' ? 'SAFE' : log.verdict)}`;
                        logBox.appendChild(line);
                    });
                    logBox.scrollTop = logBox.scrollHeight;

                    // Show toast for new phishing
                    if (data.logs.length > currentLogsCount) {
                        const latest = data.logs[data.logs.length - 1];
                        if (latest.verdict === 'YES') {
                            showToast(`⚠️ PHISHING ALERT: ${latest.sender}`);
                        }
                    }
                }
            } catch (error) {
                console.error('Polling error:', error);
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        setInterval(pollLogs, 10000);
        loadHistory();
    </script>
</body>
</html>
